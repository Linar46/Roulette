<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Roulette — Truly Fair chances</title>
    <style>
      body {
        font-family: Arial;
        text-align: center;
        background: #111;
        color: #fff;
      }
      canvas {
        border: 8px solid #333;
        border-radius: 50%;
        margin: 20px;
      }
      input,
      button {
        margin: 5px;
        padding: 8px 12px;
        font-size: 16px;
      }
      /* Separate the selectors with a comma */
      input[type="number"]::-webkit-outer-spin-button,
      input[type="number"]::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }

      .controls {
        margin: 15px;
      }
      .slot {
        display: flex;
        gap: 10px;
        margin: 8px 0;
        align-items: center;
        padding: 8px;
        border-radius: 6px;
      }
      .slot.lost {
        background: rgba(255, 60, 60, 0.25);
        text-decoration: line-through;
        opacity: 0.6;
      }
      #currentSlot {
        font-size: 26px;
        min-height: 40px;
        margin: 15px;
        font-weight: bold;
        color: #ffff88;
      }
    </style>
  </head>
  <body>
    <h1>Proportional Roulette Wheel</h1>
    <div id="currentSlot">Ready for spin...</div>

    <canvas id="wheel" width="600" height="600"></canvas>

    <div class="controls">
      <label
        >Duration (ms):
        <input
          type="number"
          id="duration"
          value="4200"
          min="1000"
          max="15000"
          step="100"
      /></label>
      <button onclick="spinWheel()">SPIN</button>
      <button onclick="addSlot()">+ ADD SLOT</button>
      <button onclick="resetAll()">RESET</button>
    </div>

    <div id="slotList"></div>

    <script>
      // ==================== DATA ====================
      let slots = [
        { name: "fifty 1", value: 50, color: "#f44336", lost: false },
        { name: "fifty 2", value: 50, color: "#e91e63", lost: false },
        { name: "fifty 3", value: 50, color: "#9c27b0", lost: false },
        { name: "150", value: 150, color: "#673ab7", lost: false },
      ];

      let currentRotation = 0;

      // Protection from reload
      window.addEventListener("beforeunload", (e) => {
        e.preventDefault();
        e.returnValue = "Progress would be lost!";
      });

      // ==================== Fair inverse proportion ====================
      function calculateAngles() {
        const active = slots.filter((s) => !s.lost);
        // Inverse proportional: higher value = smaller angle
        const weights = active.map((s) => 1 / Math.max(s.value, 1));
        const totalWeight = weights.reduce((a, b) => a + b, 0);

        let cum = 0;
        active.forEach((slot, i) => {
          slot.startAngle = cum;
          slot.angle = (weights[i] / totalWeight) * 360;
          cum += slot.angle;
        });
      }

      function getSlotUnderPointer() {
        calculateAngles();
        const active = slots.filter((s) => !s.lost);
        const pointerAngle = 270; // fixed pointer at top
        const wheelPos = ((currentRotation % 360) + 360) % 360;
        const target = (pointerAngle - wheelPos + 360) % 360;

        let cum = 0;
        for (let slot of active) {
          if (target >= cum && target < cum + slot.angle) return slot;
          cum += slot.angle;
        }
        return active[active.length - 1];
      }

      function drawWheel(highlight = null) {
        const canvas = document.getElementById("wheel");
        const ctx = canvas.getContext("2d");
        const cx = canvas.width / 2,
          cy = canvas.height / 2,
          r = 260;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        calculateAngles();

        const active = slots.filter((s) => !s.lost);

        active.forEach((slot) => {
          const start = ((slot.startAngle + currentRotation) * Math.PI) / 180;
          const end = start + (slot.angle * Math.PI) / 180;

          ctx.beginPath();
          ctx.moveTo(cx, cy);
          ctx.arc(cx, cy, r, start, end);
          ctx.closePath();

          ctx.fillStyle = slot === highlight ? "#ffff88" : slot.color;
          ctx.fill();
          ctx.strokeStyle = "#111";
          ctx.lineWidth = 5;
          ctx.stroke();

          ctx.save();
          ctx.translate(cx, cy);
          ctx.rotate(start + ((slot.angle / 2) * Math.PI) / 180);
          ctx.textAlign = "right";
          ctx.fillStyle = "#fff";
          ctx.font = "bold 20px Arial";
          ctx.fillText(slot.name, r - 40, 6);
          ctx.restore();
        });

        // Pointer
        ctx.fillStyle = "#ff00ff";
        ctx.strokeStyle = "#000";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(cx, cy - r + 0);
        ctx.moveTo(cx, cy * 0.2);
        ctx.lineTo(cx - cx * 0.05, cy * 0.1);
        ctx.lineTo(cx + cx * 0.05, cy * 0.1);
        // ctx.lineTo(cx - 25, cy - r + 20);
        // ctx.lineTo(cx + 25, cy - r + 20);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
      }

      // ==================== SPIN ====================
      function spinWheel() {
        const active = slots.filter((s) => !s.lost);
        if (active.length <= 1) return alert("Победитель: " + active[0].name);




        
        const maxDuration = 15000; 
        const duration =
          parseInt(document.getElementById("duration").value) || maxDuration;
        const scaledDuration = Math.min(rawDuration / maxDuration, 1); 
        const spinDistance = 720 + scaledDuration * 720 + 180;





        const startRot = currentRotation;
        const endRot = startRot + spinDistance;

        let startTime = Date.now();

        function animate() {
          const elapsed = Date.now() - startTime;
          let t = Math.min(elapsed / duration, 1);
          t = 1 - Math.pow(1 - t, 4);

          currentRotation = startRot + spinDistance * t;

          const slot = getSlotUnderPointer();
          document.getElementById("currentSlot").textContent = "→ " + slot.name;

          drawWheel(slot);

          if (t < 1) {
            requestAnimationFrame(animate);
          } else {
            currentRotation = endRot;
            const loser = getSlotUnderPointer();
            loser.lost = true;

            document.getElementById("currentSlot").textContent =
              `❌ Eliminated: ${loser.name}`;
            drawWheel();
            renderSlotList();

            const left = slots.filter((s) => !s.lost);
            if (left.length === 1) {
              setTimeout(() => alert(`🎉 WINNER: ${left[0].name} 🎉`), 400);
            }
          }
        }

        animate();
      }

      // ==================== UI ====================
      function sortSlots() {
        slots.sort((a, b) =>
          a.lost === b.lost ? b.value - a.value : a.lost ? 1 : -1,
        );
      }

      function addSlot() {
        const name = "New Slot";
        // const name = prompt("Name:", "New Slot");
        if (!name) return;
        const value = 9999999;
        // const value = parseFloat(prompt("Value", "1500"));
        // if (isNaN(value) || value <= 0) return alert("ERROR");

        const colors = ["#ff4444", "#ff6666", "#44ff88", "#4488ff", "#ffaa00"];
        slots.push({
          name,
          value,
          color: colors[slots.length % colors.length],
          lost: false,
        });
        sortSlots();
        renderSlotList();
        drawWheel();
      }

      function renderSlotList() {
        sortSlots();
        const container = document.getElementById("slotList");
        container.innerHTML = "<h3>Candidates</h3>";
        slots.forEach((slot, i) => {
          const el = document.createElement("div");
          el.className = `slot ${slot.lost ? "lost" : ""}`;
          el.innerHTML = `
            <input type="text" value="${slot.name}" ${slot.lost ? "disabled" : ""} onchange="updateSlot(${i},'name',this.value)" style="flex:2">
            <input type="number" value="${slot.value}" style="width:100px" ${slot.lost ? "disabled" : ""} onchange="updateSlot(${i},'value',this.value)">
            <button onclick="removeSlot(${i})" ${slot.lost ? "disabled" : ""}>✕</button>
        `;
          container.appendChild(el);
        });
      }

      function updateSlot(i, field, val) {
        if (slots[i].lost) return;
        if (field === "value")
          slots[i].value = Math.max(0.1, parseFloat(val) || 1);
        else slots[i].name = val;
        sortSlots();
        renderSlotList();
        drawWheel();
      }

      function removeSlot(i) {
        if (slots.length <= 1) return alert("Нельзя удалить последнего");
        slots.splice(i, 1);
        sortSlots();
        renderSlotList();
        drawWheel();
      }

      function resetAll() {
        if (confirm("Are sure wanna reset?")) {
          slots.forEach((s) => (s.lost = false));
          currentRotation = 0;
          sortSlots();
          renderSlotList();
          drawWheel();
        }
      }

      // Init
      sortSlots();
      renderSlotList();
      drawWheel();
    </script>
  </body>
</html>
